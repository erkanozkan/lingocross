<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LingoCross</title>
<style>
  :root{--blue:#0058be;--orange:#fea619;--ink:#0b1c30;--muted:#424754;--bg:#f8f9ff}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  header{background:var(--blue);color:#fff;padding:48px 20px;text-align:center}
  header h1{margin:0;font-size:32px;letter-spacing:-.02em}
  header p{margin:8px 0 0;opacity:.9}
  main{max-width:680px;margin:0 auto;padding:32px 20px}
  .card{display:block;background:#fff;border:1px solid #c2c6d6;border-radius:14px;padding:20px;margin:14px 0;text-decoration:none;color:var(--ink)}
  .card b{color:var(--blue)}
  .card span{display:block;color:var(--muted);font-size:14px;margin-top:4px}
  footer{text-align:center;color:var(--muted);font-size:13px;padding:24px}
</style>
</head>
<body>
<header><h1>LingoCross</h1><p>Öğretmenle kelime oyunları · Learn words with your teacher</p></header>
<main>
  <a class="card" href="privacy-policy.html"><b>Gizlilik Politikası / Privacy Policy</b><span>Hangi verileri topladığımız ve nasıl kullandığımız.</span></a>
  <a class="card" href="support.html"><b>Destek / Support</b><span>Sık sorulanlar ve iletişim: support@duocross.com</span></a>
</main>
<footer>© 2026 LingoCross</footer>
</body>
</html>
