# Lokal geliştirme için PostgreSQL. (API'yi lokalde `dotnet run` ile çalıştırın.)
# Bağlantı dizesi api/src/LingoCross.Api/appsettings.Development.json ile eşleşir.
services:
  postgres:
    image: postgres:17-alpine
    container_name: lingocross-postgres
    environment:
      POSTGRES_USER: lingocross
      POSTGRES_PASSWORD: lingocross
      POSTGRES_DB: lingocross
    ports:
      # Host portu 5433 — yaygın 5432 çakışmasını (başka Postgres'ler) önlemek için.
      - "5433:5432"
    volumes:
      - lingocross_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingocross -d lingocross"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lingocross_pgdata:
